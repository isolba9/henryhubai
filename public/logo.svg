<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="340" height="90" fill="#0a0a0a" rx="8"/>

  <!-- HENRYHUB.ai as one tight wordmark -->
  <text
    x="20" y="56"
    font-family="'IBM Plex Mono', monospace"
    font-weight="700"
    font-size="38"
    fill="#ffffff"
    letter-spacing="-0.5"
  >HENRY<tspan fill="#00ff88" filter="url(#glow)">HUB</tspan><tspan font-size="16" font-weight="400" baseline-shift="super" fill="#00ff88" opacity="0.85" filter="url(#glow)">.ai</tspan></text>

  <!-- Subtle underline accent -->
  <line x1="20" y1="66" x2="318" y2="66" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
</svg>
